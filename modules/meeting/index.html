<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Meeting | Video Conference</title>
</head>

<body class="bg-[#1a1a1a] text-white flex items-center justify-center h-screen font-sans">
    <div class="text-center w-full max-w-2xl px-4">
        <h1 class="text-3xl font-semibold mb-2">Connecting to Secure Meeting...</h1>
        <p class="text-gray-400 mb-8">Please wait for the host to let you in.</p>

        <div class="relative bg-black rounded-xl overflow-hidden aspect-video border border-gray-700 shadow-2xl">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-4">
                <div class="p-3 bg-gray-800 rounded-full cursor-pointer hover:bg-gray-700">🎤</div>
                <div class="p-3 bg-red-600 rounded-full cursor-pointer hover:bg-red-500">📞</div>
                <div class="p-3 bg-gray-800 rounded-full cursor-pointer hover:bg-gray-700">⚙️</div>
            </div>
        </div>
    </div>

    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>

</html>
